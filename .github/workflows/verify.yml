name: Verify

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

concurrency:
  group: e2e-azure
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write
  security-events: write

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_USE_OIDC: "true"
  RESOURCE_GROUP: rg-lab-johan.karlsson

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Delete all resources in lab resource group
        run: |
          RG="${{ env.RESOURCE_GROUP }}"

          # Delete resources with retry passes to handle dependency ordering.
          # Role assignments are NOT deleted here — az role assignment list
          # returns ALL assignments scoped to the RG, including the service
          # principal's own access. Deleting those would lock us out.
          # Orphaned role assignments (from deleted test identities) are harmless.
          for pass in 1 2 3; do
            RESOURCE_IDS=$(az resource list --resource-group "$RG" --query "[].id" -o tsv)
            if [ -z "$RESOURCE_IDS" ]; then
              echo "Resource group is clean."
              break
            fi
            echo "Cleanup pass $pass..."
            echo "$RESOURCE_IDS" | while read -r id; do
              echo "  Deleting: $id"
              az resource delete --ids "$id" 2>/dev/null || true
            done
            [ "$pass" -lt 3 ] && sleep 15
          done

  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Discover e2e scenarios
        id: discover
        run: |
          matrix=$(jq -n '[ inputs | {
            "use-case": input_filename | split("/")[-2],
            "plan-only": (.plan_only // false),
            "evidence": (.evidence // false)
          }]' testdata/e2e/*/expected.json)
          echo "matrix={\"include\":$matrix}" >> "$GITHUB_OUTPUT"

  verify:
    needs: [cleanup, discover]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    uses: ./.github/workflows/e2e.yml
    with:
      use-case: ${{ matrix.use-case }}
      binary-source: release
      plan-formats: json
      plan-only: ${{ matrix.plan-only }}
      evidence: ${{ matrix.evidence }}
      open-issue-on-failure: true
    secrets: inherit

  refresh-fixtures:
    needs: verify
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: fixtures-*
          path: /tmp/fixtures

      - name: Update fixture files
        run: |
          for dir in /tmp/fixtures/fixtures-*/; do
            case_name=$(basename "$dir" | sed 's/^fixtures-//')
            dest="testdata/e2e/$case_name/fixtures"
            src="$dir/testdata/e2e/$case_name"
            mkdir -p "$dest"
            for plan in create.json destroy.json; do
              [ -f "$src/$plan" ] && cp "$src/$plan" "$dest/$plan" || true
            done
          done

      - name: Check for changes
        id: diff
        run: |
          git add testdata/e2e/*/fixtures/*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with updated fixtures
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/refresh-e2e-fixtures-$(date -u +%Y%m%d)"
          git checkout -b "$BRANCH"
          git commit -m "chore: refresh e2e plan fixtures"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: refresh e2e plan fixtures" \
            --body "$(cat <<'BODY'
          Automated update from nightly verify workflow.

          Plan JSON fixtures have drifted from live Azure plans.
          This may be due to provider schema changes or new scenarios.
          BODY
          )"
