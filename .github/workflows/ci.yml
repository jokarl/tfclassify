name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - '**/go.mod'
      - '**/go.sum'
      - 'go.work'
      - 'go.work.sum'
      - 'proto/**'
      - 'testdata/e2e/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/e2e.yml'
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - '**/go.mod'
      - '**/go.sum'
      - 'go.work'
      - 'go.work.sum'
      - 'proto/**'
      - 'testdata/e2e/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race -coverprofile=coverage.out ./...

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  e2e:
    needs: [build, test, vet, vuln]
    strategy:
      fail-fast: false
      matrix:
        use-case:
          - role-assignment-privileged
          - nsg-open-inbound
          - route-table
          - role-assignment-reader
          - role-escalation-threshold
          - role-exclusion
          - keyvault-destructive
          - data-plane-detection
          - control-plane-patterns
          - custom-role-cross-reference
    uses: ./.github/workflows/e2e.yml
    with:
      use-case: ${{ matrix.use-case }}
      binary-source: build
      plan-formats: both
