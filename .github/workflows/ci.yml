name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - '**/go.mod'
      - '**/go.sum'
      - 'go.work'
      - 'go.work.sum'
      - 'proto/**'
      - 'testdata/e2e/**'
      - 'plugins/azurerm/roledata/**'
      - 'plugins/azurerm/actiondata/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/e2e.yml'
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - '**/go.mod'
      - '**/go.sum'
      - 'go.work'
      - 'go.work.sum'
      - 'proto/**'
      - 'testdata/e2e/**'
      - 'plugins/azurerm/roledata/**'
      - 'plugins/azurerm/actiondata/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - run: go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - run: go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.out

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9

  proto-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: '33.4'
      - name: Install Go protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - name: Regenerate protobuf code
        run: |
          protoc --go_out=. --go_opt=module=github.com/jokarl/tfclassify \
                 --go-grpc_out=. --go-grpc_opt=module=github.com/jokarl/tfclassify \
                 proto/tfclassify.proto
      - name: Check for differences
        run: git diff --exit-code sdk/pb/

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  e2e-fixtures:
    needs: [build, test, vet, lint, proto-check, vuln]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - name: Classify committed plan fixtures
        run: bash testdata/e2e/run.sh --build --fixtures

  e2e-discover:
    if: "contains(github.event.pull_request.labels.*.name, 'autorelease: pending')"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Discover e2e scenarios
        id: discover
        run: |
          # Scenarios marked fixture_only have no main.tf — they exercise the
          # classifier against committed plan JSON only. Skip them in the
          # live e2e matrix; the e2e-fixtures job above still classifies them.
          matrix=$(jq -cn '[ inputs | select((.fixture_only // false) | not) | {
            "use-case": input_filename | split("/")[-2],
            "plan-only": (.plan_only // false),
            "evidence": (.evidence // false)
          }]' testdata/e2e/*/expected.json)
          echo "matrix={\"include\":$matrix}" >> "$GITHUB_OUTPUT"

  e2e:
    needs: [e2e-discover, build, test, vet, lint, proto-check, vuln]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.e2e-discover.outputs.matrix) }}
    uses: ./.github/workflows/e2e.yml
    with:
      use-case: ${{ matrix.use-case }}
      binary-source: build
      plan-formats: both
      plan-only: ${{ matrix.plan-only }}
      evidence: ${{ matrix.evidence }}
    secrets: inherit
