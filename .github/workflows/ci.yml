name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - '**/go.mod'
      - '**/go.sum'
      - 'go.work'
      - 'go.work.sum'
      - 'proto/**'
      - 'testdata/e2e/**'
      - 'plugins/azurerm/roledata/**'
      - 'plugins/azurerm/actiondata/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/e2e.yml'
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - '**/go.mod'
      - '**/go.sum'
      - 'go.work'
      - 'go.work.sum'
      - 'proto/**'
      - 'testdata/e2e/**'
      - 'plugins/azurerm/roledata/**'
      - 'plugins/azurerm/actiondata/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9

  proto-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.4'
      - name: Install Go protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - name: Regenerate protobuf code
        run: |
          protoc --go_out=. --go_opt=module=github.com/jokarl/tfclassify \
                 --go-grpc_out=. --go-grpc_opt=module=github.com/jokarl/tfclassify \
                 proto/tfclassify.proto
      - name: Check for differences
        run: git diff --exit-code sdk/pb/

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  e2e:
    needs: [build, test, vet, lint, proto-check, vuln]
    strategy:
      fail-fast: false
      matrix:
        use-case:
          - role-assignment-privileged
          - route-table
          - role-assignment-reader
          - role-escalation-threshold
          - role-exclusion
          - data-plane-detection
          - control-plane-patterns
          - custom-role-cross-reference
          - modules-pluginless
          - modules-plugin
          - cis-azure-foundations
          - blast-radius
          - evidence-signing
        include:
          # custom-role-cross-reference creates an azurerm_role_definition, which
          # requires Microsoft.Authorization/roleDefinitions/write — a permission
          # the CI service principal does not have. Plan-only mode is sufficient
          # because the test validates that tfclassify cross-references the custom
          # role definition from the plan; apply/destroy adds no classification coverage.
          - use-case: custom-role-cross-reference
            plan-only: true
          # evidence-signing only needs a plan to validate evidence generation
          # and Ed25519 signature verification. No apply/destroy needed.
          - use-case: evidence-signing
            plan-only: true
            evidence: true
    uses: ./.github/workflows/e2e.yml
    with:
      use-case: ${{ matrix.use-case }}
      binary-source: build
      plan-formats: both
      plan-only: ${{ matrix.plan-only || false }}
      evidence: ${{ matrix.evidence || false }}
    secrets: inherit
