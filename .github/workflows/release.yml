name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tags:
        description: "CSV of release tags to rebuild, e.g. tfclassify-v0.1.0,tfclassify-plugin-azurerm-v0.1.0"
        required: false
        type: string

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      cli_release_created: ${{ steps.release.outputs.release_created }}
      cli_tag_name: ${{ steps.release.outputs.tag_name }}
      cli_version: ${{ steps.release.outputs.version }}
      plugin_release_created: ${{ steps.release.outputs['plugins/azurerm--release_created'] }}
      plugin_tag_name: ${{ steps.release.outputs['plugins/azurerm--tag_name'] }}
      plugin_version: ${{ steps.release.outputs['plugins/azurerm--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  resolve:
    if: github.event_name == 'workflow_dispatch' && inputs.tags != ''
    runs-on: ubuntu-latest
    outputs:
      cli_release: ${{ steps.resolve.outputs.cli_release }}
      cli_tag: ${{ steps.resolve.outputs.cli_tag }}
      cli_version: ${{ steps.resolve.outputs.cli_version }}
      plugin_release: ${{ steps.resolve.outputs.plugin_release }}
      plugin_tag: ${{ steps.resolve.outputs.plugin_tag }}
      plugin_version: ${{ steps.resolve.outputs.plugin_version }}
    steps:
      - name: Resolve release parameters
        id: resolve
        run: |
          IFS=',' read -ra TAGS <<< "${{ inputs.tags }}"
          for tag in "${TAGS[@]}"; do
            tag=$(echo "$tag" | xargs)
            if [[ "$tag" =~ ^tfclassify-plugin-azurerm-v(.+)$ ]]; then
              echo "plugin_release=true" >> "$GITHUB_OUTPUT"
              echo "plugin_tag=$tag" >> "$GITHUB_OUTPUT"
              echo "plugin_version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            elif [[ "$tag" =~ ^tfclassify-v(.+)$ ]]; then
              echo "cli_release=true" >> "$GITHUB_OUTPUT"
              echo "cli_tag=$tag" >> "$GITHUB_OUTPUT"
              echo "cli_version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Unrecognized tag format: $tag"
            fi
          done

  goreleaser-cli:
    needs: [release-please, resolve]
    if: >-
      always() &&
      (needs.release-please.outputs.cli_release_created == 'true' || needs.resolve.outputs.cli_release == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Create local goreleaser tag
        run: git tag "v${{ needs.resolve.outputs.cli_version || needs.release-please.outputs.cli_version }}"
      - uses: goreleaser/goreleaser-action@v7
        with:
          args: release --clean
        env:
          GORELEASER_CURRENT_TAG: v${{ needs.resolve.outputs.cli_version || needs.release-please.outputs.cli_version }}
      - name: Verify dist artifacts exist
        run: |
          if ! ls dist/tfclassify_*.zip 1>/dev/null 2>&1; then
            echo "::error::No tfclassify zip artifacts found in dist/"
            exit 1
          fi
          if ! ls dist/tfclassify_*_checksums.txt 1>/dev/null 2>&1; then
            echo "::error::No checksums file found in dist/"
            exit 1
          fi
          echo "Artifacts found:"
          ls -la dist/tfclassify_*.zip dist/tfclassify_*_checksums.txt
      - name: Upload artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.resolve.outputs.cli_tag || needs.release-please.outputs.cli_tag_name }}" \
            dist/tfclassify_*.zip \
            dist/tfclassify_*_checksums.txt \
            --clobber

  goreleaser-plugin:
    needs: [release-please, resolve]
    if: >-
      always() &&
      (needs.release-please.outputs.plugin_release_created == 'true' || needs.resolve.outputs.plugin_release == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Create local goreleaser tag
        run: git tag "v${{ needs.resolve.outputs.plugin_version || needs.release-please.outputs.plugin_version }}"
      - uses: goreleaser/goreleaser-action@v7
        with:
          workdir: plugins/azurerm
          args: release --clean
        env:
          GORELEASER_CURRENT_TAG: v${{ needs.resolve.outputs.plugin_version || needs.release-please.outputs.plugin_version }}
      - name: Verify dist artifacts exist
        run: |
          if ! ls plugins/azurerm/dist/tfclassify-plugin-azurerm_*.zip 1>/dev/null 2>&1; then
            echo "::error::No plugin zip artifacts found in plugins/azurerm/dist/"
            exit 1
          fi
          if ! ls plugins/azurerm/dist/tfclassify-plugin-azurerm_*_checksums.txt 1>/dev/null 2>&1; then
            echo "::error::No plugin checksums file found in plugins/azurerm/dist/"
            exit 1
          fi
          echo "Artifacts found:"
          ls -la plugins/azurerm/dist/tfclassify-plugin-azurerm_*.zip plugins/azurerm/dist/tfclassify-plugin-azurerm_*_checksums.txt
      - name: Upload artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.resolve.outputs.plugin_tag || needs.release-please.outputs.plugin_tag_name }}" \
            plugins/azurerm/dist/tfclassify-plugin-azurerm_*.zip \
            plugins/azurerm/dist/tfclassify-plugin-azurerm_*_checksums.txt \
            --clobber

  trigger-verify:
    needs: [goreleaser-cli, goreleaser-plugin]
    if: always() && (needs.goreleaser-cli.result == 'success' || needs.goreleaser-plugin.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger verify workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run verify.yml --repo "${{ github.repository }}"
