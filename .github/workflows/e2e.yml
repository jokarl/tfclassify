name: E2E Tests

on:
  workflow_call:
    inputs:
      use-case:
        required: true
        type: string
        description: Name of the e2e test case directory under testdata/e2e/
      binary-source:
        required: true
        type: string
        description: How to get binaries — "build" (from source) or "release" (download latest)
      plan-formats:
        required: false
        type: string
        default: json
        description: Plan formats to test — "json", "binary", or "both"
      plan-only:
        required: false
        type: boolean
        default: false
        description: Only run plan + classify (skip apply/destroy). Use when the scenario requires permissions the CI service principal lacks.
      evidence:
        required: false
        type: boolean
        default: false
        description: Generate and verify signed evidence artifacts alongside classification
      open-issue-on-failure:
        required: false
        type: boolean
        default: false
        description: Create a GitHub issue when the e2e test fails

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_USE_OIDC: "true"
  TFCLASSIFY_PLUGIN_DIR: /tmp/tfclassify-plugins

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        if: inputs.binary-source == 'build'
        with:
          go-version-file: go.mod

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Build from source
        if: inputs.binary-source == 'build'
        run: |
          go build -o /usr/local/bin/tfclassify ./cmd/tfclassify
          mkdir -p "$TFCLASSIFY_PLUGIN_DIR"
          go build -o "$TFCLASSIFY_PLUGIN_DIR/tfclassify-plugin-azurerm" ./plugins/azurerm

      - name: Validate config
        if: inputs.binary-source == 'build'
        run: |
          tfclassify validate \
            -c testdata/e2e/${{ inputs.use-case }}/.tfclassify.hcl

      - name: Download release
        if: inputs.binary-source == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Download latest CLI release
          LATEST_CLI_TAG=$(gh release list --json tagName --jq \
            '[.[] | select(.tagName | startswith("tfclassify-v"))][0].tagName')
          gh release download "$LATEST_CLI_TAG" --pattern 'tfclassify_*_linux_amd64.zip'
          unzip -o tfclassify_*.zip -d /usr/local/bin
          chmod +x /usr/local/bin/tfclassify
          rm -f tfclassify_*.zip

          # Download latest plugin release
          LATEST_PLUGIN_TAG=$(gh release list --json tagName --jq \
            '[.[] | select(.tagName | startswith("tfclassify-plugin-azurerm-v"))][0].tagName')
          gh release download "$LATEST_PLUGIN_TAG" --pattern 'tfclassify-plugin-azurerm_*_linux_amd64.zip'
          mkdir -p "$TFCLASSIFY_PLUGIN_DIR"
          unzip -o tfclassify-plugin-azurerm_*.zip -d "$TFCLASSIFY_PLUGIN_DIR"
          chmod +x "$TFCLASSIFY_PLUGIN_DIR/tfclassify-plugin-azurerm"
          rm -f tfclassify-plugin-azurerm_*.zip

      - name: Record versions
        id: versions
        run: |
          echo "tfclassify=$(tfclassify --version)" >> "$GITHUB_OUTPUT"
          echo "terraform=$(terraform --version -json | jq -r .terraform_version)" >> "$GITHUB_OUTPUT"

      - name: Generate signing key pair
        if: inputs.evidence
        run: |
          openssl genpkey -algorithm Ed25519 -out /tmp/evidence-private.pem
          openssl pkey -in /tmp/evidence-private.pem -pubout -out /tmp/evidence-public.pem
          echo "TFCLASSIFY_SIGNING_KEY=/tmp/evidence-private.pem" >> "$GITHUB_ENV"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Terraform init
        run: terraform -chdir=testdata/e2e/${{ inputs.use-case }} init

      - name: Create plan
        run: |
          terraform -chdir=testdata/e2e/${{ inputs.use-case }} plan -var-file=../e2e.tfvars -out=create.tfplan
          terraform -chdir=testdata/e2e/${{ inputs.use-case }} show -json create.tfplan \
            > testdata/e2e/${{ inputs.use-case }}/create.json
          echo "::group::Create plan JSON"
          jq . testdata/e2e/${{ inputs.use-case }}/create.json
          echo "::endgroup::"

      - name: Classify create plan (JSON)
        id: classify-create-json
        if: inputs.plan-formats == 'json' || inputs.plan-formats == 'both'
        run: |
          EXPECTED_EXIT=$(jq -r '.create.exit_code' testdata/e2e/${{ inputs.use-case }}/expected.json)
          EVIDENCE_FLAG=""
          if [ "${{ inputs.evidence }}" = "true" ]; then
            EVIDENCE_FLAG="--evidence-file /tmp/evidence-create-json.json"
          fi
          set +e
          tfclassify \
            -p testdata/e2e/${{ inputs.use-case }}/create.json \
            -c testdata/e2e/${{ inputs.use-case }}/.tfclassify.hcl \
            -o json --detailed-exitcode $EVIDENCE_FLAG > testdata/e2e/${{ inputs.use-case }}/create-result.json
          ACTUAL_EXIT=$?
          set -e
          echo "::group::Classification result (JSON)"
          jq . testdata/e2e/${{ inputs.use-case }}/create-result.json
          echo "::endgroup::"
          echo "expected=$EXPECTED_EXIT" >> "$GITHUB_OUTPUT"
          echo "actual=$ACTUAL_EXIT" >> "$GITHUB_OUTPUT"
          if [ "$ACTUAL_EXIT" != "$EXPECTED_EXIT" ]; then
            echo "::error::Create phase (JSON): expected exit code $EXPECTED_EXIT, got $ACTUAL_EXIT"
            exit 1
          fi

      - name: Verify evidence (create JSON)
        if: inputs.evidence && steps.classify-create-json.outcome == 'success'
        run: |
          tfclassify verify \
            --evidence-file /tmp/evidence-create-json.json \
            --public-key /tmp/evidence-public.pem
          echo "Evidence verification passed (create JSON)"

      - name: Explain create plan (JSON)
        if: steps.classify-create-json.outcome == 'success'
        continue-on-error: true
        run: |
          echo "### Explain: create (JSON)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tfclassify explain \
            -p testdata/e2e/${{ inputs.use-case }}/create.json \
            -c testdata/e2e/${{ inputs.use-case }}/.tfclassify.hcl \
            >> "$GITHUB_STEP_SUMMARY" 2>&1
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Classify create plan (SARIF)
        if: (inputs.plan-formats == 'json' || inputs.plan-formats == 'both') && steps.classify-create-json.outcome == 'success'
        run: |
          EXPECTED_EXIT=$(jq -r '.create.exit_code' testdata/e2e/${{ inputs.use-case }}/expected.json)
          set +e
          tfclassify \
            -p testdata/e2e/${{ inputs.use-case }}/create.json \
            -c testdata/e2e/${{ inputs.use-case }}/.tfclassify.hcl \
            -o sarif --detailed-exitcode > /tmp/tfclassify-${{ inputs.use-case }}.sarif
          ACTUAL_EXIT=$?
          set -e
          if [ "$ACTUAL_EXIT" != "$EXPECTED_EXIT" ]; then
            echo "::error::Create phase (SARIF): expected exit code $EXPECTED_EXIT, got $ACTUAL_EXIT"
            exit 1
          fi

      - name: Upload SARIF to GitHub Code Scanning
        if: (inputs.plan-formats == 'json' || inputs.plan-formats == 'both') && steps.classify-create-json.outcome == 'success'
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: /tmp/tfclassify-${{ inputs.use-case }}.sarif
          category: tfclassify-${{ inputs.use-case }}

      - name: Classify create plan (binary)
        id: classify-create-binary
        if: inputs.plan-formats == 'binary' || inputs.plan-formats == 'both'
        run: |
          EXPECTED_EXIT=$(jq -r '.create.exit_code' testdata/e2e/${{ inputs.use-case }}/expected.json)
          EVIDENCE_FLAG=""
          if [ "${{ inputs.evidence }}" = "true" ]; then
            EVIDENCE_FLAG="--evidence-file /tmp/evidence-create-binary.json"
          fi
          set +e
          tfclassify \
            -p testdata/e2e/${{ inputs.use-case }}/create.tfplan \
            -c testdata/e2e/${{ inputs.use-case }}/.tfclassify.hcl \
            -o json --detailed-exitcode $EVIDENCE_FLAG > testdata/e2e/${{ inputs.use-case }}/create-result-binary.json
          ACTUAL_EXIT=$?
          set -e
          echo "::group::Classification result (binary)"
          jq . testdata/e2e/${{ inputs.use-case }}/create-result-binary.json
          echo "::endgroup::"
          if [ "$ACTUAL_EXIT" != "$EXPECTED_EXIT" ]; then
            echo "::error::Create phase (binary): expected exit code $EXPECTED_EXIT, got $ACTUAL_EXIT"
            exit 1
          fi

      - name: Verify evidence (create binary)
        if: inputs.evidence && steps.classify-create-binary.outcome == 'success'
        run: |
          tfclassify verify \
            --evidence-file /tmp/evidence-create-binary.json \
            --public-key /tmp/evidence-public.pem
          echo "Evidence verification passed (create binary)"

      - name: Explain create plan (binary)
        if: steps.classify-create-binary.outcome == 'success'
        continue-on-error: true
        run: |
          echo "### Explain: create (binary)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tfclassify explain \
            -p testdata/e2e/${{ inputs.use-case }}/create.tfplan \
            -c testdata/e2e/${{ inputs.use-case }}/.tfclassify.hcl \
            >> "$GITHUB_STEP_SUMMARY" 2>&1
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Apply
        id: apply
        if: ${{ !inputs.plan-only }}
        run: terraform -chdir=testdata/e2e/${{ inputs.use-case }} apply -auto-approve create.tfplan

      - name: Destroy plan
        if: ${{ !inputs.plan-only }}
        run: |
          terraform -chdir=testdata/e2e/${{ inputs.use-case }} plan -destroy -var-file=../e2e.tfvars -out=destroy.tfplan
          terraform -chdir=testdata/e2e/${{ inputs.use-case }} show -json destroy.tfplan \
            > testdata/e2e/${{ inputs.use-case }}/destroy.json
          echo "::group::Destroy plan JSON"
          jq . testdata/e2e/${{ inputs.use-case }}/destroy.json
          echo "::endgroup::"

      - name: Classify destroy plan (JSON)
        id: classify-destroy-json
        if: ${{ !inputs.plan-only && (inputs.plan-formats == 'json' || inputs.plan-formats == 'both') }}
        run: |
          EXPECTED_EXIT=$(jq -r '.destroy.exit_code' testdata/e2e/${{ inputs.use-case }}/expected.json)
          EVIDENCE_FLAG=""
          if [ "${{ inputs.evidence }}" = "true" ]; then
            EVIDENCE_FLAG="--evidence-file /tmp/evidence-destroy-json.json"
          fi
          set +e
          tfclassify \
            -p testdata/e2e/${{ inputs.use-case }}/destroy.json \
            -c testdata/e2e/${{ inputs.use-case }}/.tfclassify.hcl \
            -o json --detailed-exitcode $EVIDENCE_FLAG > testdata/e2e/${{ inputs.use-case }}/destroy-result.json
          ACTUAL_EXIT=$?
          set -e
          echo "::group::Classification result (JSON)"
          jq . testdata/e2e/${{ inputs.use-case }}/destroy-result.json
          echo "::endgroup::"
          echo "expected=$EXPECTED_EXIT" >> "$GITHUB_OUTPUT"
          echo "actual=$ACTUAL_EXIT" >> "$GITHUB_OUTPUT"
          if [ "$ACTUAL_EXIT" != "$EXPECTED_EXIT" ]; then
            echo "::error::Destroy phase (JSON): expected exit code $EXPECTED_EXIT, got $ACTUAL_EXIT"
            exit 1
          fi

      - name: Verify evidence (destroy JSON)
        if: inputs.evidence && steps.classify-destroy-json.outcome == 'success'
        run: |
          tfclassify verify \
            --evidence-file /tmp/evidence-destroy-json.json \
            --public-key /tmp/evidence-public.pem
          echo "Evidence verification passed (destroy JSON)"

      - name: Explain destroy plan (JSON)
        if: steps.classify-destroy-json.outcome == 'success'
        continue-on-error: true
        run: |
          echo "### Explain: destroy (JSON)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tfclassify explain \
            -p testdata/e2e/${{ inputs.use-case }}/destroy.json \
            -c testdata/e2e/${{ inputs.use-case }}/.tfclassify.hcl \
            >> "$GITHUB_STEP_SUMMARY" 2>&1
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Classify destroy plan (SARIF)
        if: ${{ !inputs.plan-only && (inputs.plan-formats == 'json' || inputs.plan-formats == 'both') && steps.classify-destroy-json.outcome == 'success' }}
        run: |
          EXPECTED_EXIT=$(jq -r '.destroy.exit_code' testdata/e2e/${{ inputs.use-case }}/expected.json)
          set +e
          tfclassify \
            -p testdata/e2e/${{ inputs.use-case }}/destroy.json \
            -c testdata/e2e/${{ inputs.use-case }}/.tfclassify.hcl \
            -o sarif --detailed-exitcode > /dev/null
          ACTUAL_EXIT=$?
          set -e
          if [ "$ACTUAL_EXIT" != "$EXPECTED_EXIT" ]; then
            echo "::error::Destroy phase (SARIF): expected exit code $EXPECTED_EXIT, got $ACTUAL_EXIT"
            exit 1
          fi

      - name: Classify destroy plan (binary)
        id: classify-destroy-binary
        if: ${{ !inputs.plan-only && (inputs.plan-formats == 'binary' || inputs.plan-formats == 'both') }}
        run: |
          EXPECTED_EXIT=$(jq -r '.destroy.exit_code' testdata/e2e/${{ inputs.use-case }}/expected.json)
          EVIDENCE_FLAG=""
          if [ "${{ inputs.evidence }}" = "true" ]; then
            EVIDENCE_FLAG="--evidence-file /tmp/evidence-destroy-binary.json"
          fi
          set +e
          tfclassify \
            -p testdata/e2e/${{ inputs.use-case }}/destroy.tfplan \
            -c testdata/e2e/${{ inputs.use-case }}/.tfclassify.hcl \
            -o json --detailed-exitcode $EVIDENCE_FLAG > testdata/e2e/${{ inputs.use-case }}/destroy-result-binary.json
          ACTUAL_EXIT=$?
          set -e
          echo "::group::Classification result (binary)"
          jq . testdata/e2e/${{ inputs.use-case }}/destroy-result-binary.json
          echo "::endgroup::"
          if [ "$ACTUAL_EXIT" != "$EXPECTED_EXIT" ]; then
            echo "::error::Destroy phase (binary): expected exit code $EXPECTED_EXIT, got $ACTUAL_EXIT"
            exit 1
          fi

      - name: Verify evidence (destroy binary)
        if: inputs.evidence && steps.classify-destroy-binary.outcome == 'success'
        run: |
          tfclassify verify \
            --evidence-file /tmp/evidence-destroy-binary.json \
            --public-key /tmp/evidence-public.pem
          echo "Evidence verification passed (destroy binary)"

      - name: Explain destroy plan (binary)
        if: steps.classify-destroy-binary.outcome == 'success'
        continue-on-error: true
        run: |
          echo "### Explain: destroy (binary)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tfclassify explain \
            -p testdata/e2e/${{ inputs.use-case }}/destroy.tfplan \
            -c testdata/e2e/${{ inputs.use-case }}/.tfclassify.hcl \
            >> "$GITHUB_STEP_SUMMARY" 2>&1
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always() && steps.apply.outcome != 'skipped'
        continue-on-error: true
        run: terraform -chdir=testdata/e2e/${{ inputs.use-case }} destroy -auto-approve -var-file=../e2e.tfvars

      - name: Open issue on failure
        if: failure() && inputs.open-issue-on-failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create verification --color "d93f0b" \
            --description "Nightly verification failure" --force 2>/dev/null || true

          cat > /tmp/issue-body.md <<EOF
          ## Verification failure: ${{ inputs.use-case }}

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ### Versions
          - tfclassify: ${{ steps.versions.outputs.tfclassify }}
          - terraform: ${{ steps.versions.outputs.terraform }}

          ### Create phase
          - Expected exit code: ${{ steps.classify-create-json.outputs.expected }}
          - Actual exit code: ${{ steps.classify-create-json.outputs.actual }}

          ### Destroy phase
          - Expected exit code: ${{ steps.classify-destroy-json.outputs.expected }}
          - Actual exit code: ${{ steps.classify-destroy-json.outputs.actual }}
          EOF

          gh issue create \
            --title "[verify] ${{ inputs.use-case }} failed ($(date -u +%Y-%m-%d))" \
            --label "verification" \
            --body-file /tmp/issue-body.md
