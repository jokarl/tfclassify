version: 2
project_name: tfclassify

builds:
  - main: ./cmd/tfclassify
    binary: tfclassify
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

release:
  skip: true
